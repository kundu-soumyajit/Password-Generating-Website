<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>passgen.com</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #072fe0 0%, #7a13e2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h1 i {
            color: #667eea;
            margin-right: 10px;
        }

        .password-display {
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            word-break: break-all;
        }

        .password-display input {
            background: none;
            border: none;
            font-size: 16px;
            color: #333;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 80%;
            outline: none;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .copy-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .length-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            transition: background 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
        }

        .length-value {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            min-width: 50px;
            text-align: center;
            font-weight: bold;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
        }

        .option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            margin-right: 10px;
        }

        .option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #555;
        }

        .strength-meter {
            margin-bottom: 20px;
        }

        .strength-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .strength-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .strength-weak {
            width: 25%;
            background: #ff6b6b;
        }

        .strength-fair {
            width: 50%;
            background: #ffa500;
        }

        .strength-good {
            width: 75%;
            background: #4ecdc4;
        }

        .strength-strong {
            width: 100%;
            background: #2ecc71;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .clear-btn:hover {
            background: #efefef;
            border-color: #667eea;
        }

        .refresh-btn {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .refresh-btn:hover {
            background: #efefef;
            border-color: #667eea;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease-out, slideOut 0.3s ease-out 2.7s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .generate-btn {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-lock"></i> Password Generator</h1>

        <div class="password-display">
            <input type="text" id="passwordDisplay" readonly value="Click Generate">
            <button class="copy-btn" onclick="copyPassword()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <div class="form-group">
            <label>Password Length</label>
            <div class="length-container">
                <input type="range" id="lengthSlider" min="4" max="50" value="16" oninput="updateLength()">
                <div class="length-value" id="lengthValue">16</div>
            </div>
        </div>

        <div class="form-group">
            <label>Character Options</label>
            <div class="options">
                <div class="option">
                    <input type="checkbox" id="uppercase" checked onchange="generatePassword()">
                    <label for="uppercase">Uppercase (A-Z)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="lowercase" checked onchange="generatePassword()">
                    <label for="lowercase">Lowercase (a-z)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="numbers" checked onchange="generatePassword()">
                    <label for="numbers">Numbers (0-9)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="symbols" checked onchange="generatePassword()">
                    <label for="symbols">Symbols (!@#$%)</label>
                </div>
            </div>
        </div>

        <div class="strength-meter">
            <div class="strength-label">Password Strength</div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="refresh-btn" onclick="generatePassword()">
                <i class="fas fa-redo"></i> Regenerate
            </button>
            <button class="clear-btn" onclick="clearAll()">
                <i class="fas fa-trash"></i> Clear
            </button>
            <button class="generate-btn" onclick="generatePassword()">
                <i class="fas fa-magic"></i> Generate Password
            </button>
        </div>

        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Your passwords are generated locally and never stored
        </div>
    </div>

    <script>
        const passwordDisplay = document.getElementById('passwordDisplay');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercaseCheck = document.getElementById('uppercase');
        const lowercaseCheck = document.getElementById('lowercase');
        const numbersCheck = document.getElementById('numbers');
        const symbolsCheck = document.getElementById('symbols');
        const strengthFill = document.getElementById('strengthFill');

        const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowercase = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        function updateLength() {
            lengthValue.textContent = lengthSlider.value;
            generatePassword();
        }

        function generatePassword() {
            let characters = '';
            
            if (uppercaseCheck.checked) characters += uppercase;
            if (lowercaseCheck.checked) characters += lowercase;
            if (numbersCheck.checked) characters += numbers;
            if (symbolsCheck.checked) characters += symbols;

            if (characters === '') {
                passwordDisplay.value = 'Select at least one option';
                strengthFill.className = 'strength-fill';
                return;
            }

            let password = '';
            const length = lengthSlider.value;

            for (let i = 0; i < length; i++) {
                password += characters.charAt(Math.floor(Math.random() * characters.length));
            }

            passwordDisplay.value = password;
            updateStrengthMeter(password);
        }

        function updateStrengthMeter(password) {
            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (password.length >= 16) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password)) strength++;

            strengthFill.className = 'strength-fill';

            if (strength <= 2) {
                strengthFill.classList.add('strength-weak');
            } else if (strength <= 3) {
                strengthFill.classList.add('strength-fair');
            } else if (strength <= 4) {
                strengthFill.classList.add('strength-good');
            } else {
                strengthFill.classList.add('strength-strong');
            }
        }

        function copyPassword() {
            const password = passwordDisplay.value;
            
            if (password && password !== 'Click Generate' && password !== 'Select at least one option') {
                navigator.clipboard.writeText(password).then(() => {
                    showNotification('Password copied to clipboard!');
                }).catch(() => {
                    alert('Failed to copy password');
                });
            }
        }

        function clearAll() {
            passwordDisplay.value = 'Click Generate';
            lengthSlider.value = 16;
            lengthValue.textContent = 16;
            uppercaseCheck.checked = true;
            lowercaseCheck.checked = true;
            numbersCheck.checked = true;
            symbolsCheck.checked = true;
            strengthFill.className = 'strength-fill';
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Generate initial password
        window.addEventListener('load', () => {
            generatePassword();
        });
    </script>
</body>
</html>
